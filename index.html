<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stickman Wars">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Stickman Wars</title>
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link rel="manifest" href="/manifest.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            border: 2px solid #333;
            cursor: crosshair;
            image-rendering: pixelated;
        }
        #rotateOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .rotate-content {
            text-align: center;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .rotate-icon {
            font-size: 64px;
            transform: rotate(90deg);
            display: inline-block;
        }
        .rotate-arrow {
            font-size: 48px;
            color: #4488FF;
            margin: 12px 0;
        }
        .rotate-content p {
            font-size: 20px;
            color: #aaa;
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotateOverlay { display: flex; }
            canvas { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="rotateOverlay">
        <div class="rotate-content">
            <div class="rotate-icon">&#x1F4F1;</div>
            <div class="rotate-arrow">&#x21BB;</div>
            <p>Rotate your device to landscape</p>
        </div>
    </div>

    <!-- PeerJS for WebRTC peer-to-peer multiplayer (1v1 mode) -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <!-- Firebase Web SDK (compat build — no module bundler). -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- Scripts loaded in dependency order.
         ?v=... is a cache-buster — bump it on every deploy so GitHub Pages
         and browsers can't serve stale JS. -->
    <script src="js/firebase-config.js?v=20260430c"></script>
    <script src="js/lobby.js?v=20260430c"></script>
    <script src="js/version.js?v=20260430c"></script>
    <script src="js/constants.js?v=20260430c"></script>
    <script src="js/utils.js?v=20260430c"></script>
    <script src="js/iso.js?v=20260430c"></script>
    <script src="js/input.js?v=20260430c"></script>
    <script src="js/touch.js?v=20260430c"></script>
    <script src="js/camera.js?v=20260430c"></script>
    <script src="js/particles.js?v=20260430c"></script>
    <script src="js/stickman.js?v=20260430c"></script>
    <script src="js/weapon.js?v=20260430c"></script>
    <script src="js/entity.js?v=20260430c"></script>
    <script src="js/player.js?v=20260430c"></script>
    <script src="js/ai.js?v=20260430c"></script>
    <script src="js/boss.js?v=20260430c"></script>
    <script src="js/currency.js?v=20260430c"></script>
    <script src="js/crate.js?v=20260430c"></script>
    <script src="js/biome.js?v=20260430c"></script>
    <script src="js/minimap.js?v=20260430c"></script>
    <script src="js/hud.js?v=20260430c"></script>
    <script src="js/progression.js?v=20260430c"></script>
    <script src="js/music.js?v=20260430c"></script>
    <script src="js/multiplayer.js?v=20260430c"></script>
    <script src="js/game.js?v=20260430c"></script>
    <script src="js/main.js?v=20260430c"></script>

    <script>
        // Register the service worker so the game installs as a PWA and
        // works offline after the first visit. Only attempt on HTTPS or
        // localhost — file:// or http:// non-localhost won't allow it.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((err) => {
                    console.warn('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
