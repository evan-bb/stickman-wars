<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Stickman Wars</title>
    <link rel="icon" href="data:,">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            border: 2px solid #333;
            cursor: crosshair;
            image-rendering: pixelated;
        }
        #rotateOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .rotate-content {
            text-align: center;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .rotate-icon {
            font-size: 64px;
            transform: rotate(90deg);
            display: inline-block;
        }
        .rotate-arrow {
            font-size: 48px;
            color: #4488FF;
            margin: 12px 0;
        }
        .rotate-content p {
            font-size: 20px;
            color: #aaa;
        }
        @media (orientation: portrait) and (max-width: 900px) {
            #rotateOverlay { display: flex; }
            canvas { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="rotateOverlay">
        <div class="rotate-content">
            <div class="rotate-icon">&#x1F4F1;</div>
            <div class="rotate-arrow">&#x21BB;</div>
            <p>Rotate your device to landscape</p>
        </div>
    </div>

    <!-- Scripts loaded in dependency order.
         ?v=... is a cache-buster — bump it on every deploy so GitHub Pages
         and browsers can't serve stale JS. -->
    <script src="js/constants.js?v=20260425e"></script>
    <script src="js/utils.js?v=20260425e"></script>
    <script src="js/iso.js?v=20260425e"></script>
    <script src="js/input.js?v=20260425e"></script>
    <script src="js/touch.js?v=20260425e"></script>
    <script src="js/camera.js?v=20260425e"></script>
    <script src="js/particles.js?v=20260425e"></script>
    <script src="js/stickman.js?v=20260425e"></script>
    <script src="js/weapon.js?v=20260425e"></script>
    <script src="js/entity.js?v=20260425e"></script>
    <script src="js/player.js?v=20260425e"></script>
    <script src="js/ai.js?v=20260425e"></script>
    <script src="js/boss.js?v=20260425e"></script>
    <script src="js/currency.js?v=20260425e"></script>
    <script src="js/crate.js?v=20260425e"></script>
    <script src="js/biome.js?v=20260425e"></script>
    <script src="js/minimap.js?v=20260425e"></script>
    <script src="js/hud.js?v=20260425e"></script>
    <script src="js/progression.js?v=20260425e"></script>
    <script src="js/music.js?v=20260425e"></script>
    <script src="js/game.js?v=20260425e"></script>
    <script src="js/main.js?v=20260425e"></script>
</body>
</html>
