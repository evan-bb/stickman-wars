<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a1e"/>
      <stop offset="1" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Crossed swords behind stickmen -->
  <g stroke="#FFD700" stroke-width="10" stroke-linecap="round" opacity="0.55">
    <line x1="120" y1="120" x2="392" y2="392"/>
    <line x1="392" y1="120" x2="120" y2="392"/>
  </g>
  <g fill="#FFD700" opacity="0.65">
    <circle cx="120" cy="120" r="14"/>
    <circle cx="392" cy="120" r="14"/>
    <circle cx="120" cy="392" r="14"/>
    <circle cx="392" cy="392" r="14"/>
  </g>

  <!-- Blue stickman (left, attacking) -->
  <g stroke="#4488FF" stroke-width="14" stroke-linecap="round" fill="none">
    <circle cx="180" cy="200" r="32" stroke="#4488FF" stroke-width="14" fill="#0a0a1e"/>
    <line x1="180" y1="232" x2="180" y2="340"/>
    <!-- arms thrust -->
    <line x1="180" y1="270" x2="240" y2="240"/>
    <line x1="180" y1="270" x2="135" y2="300"/>
    <!-- legs -->
    <line x1="180" y1="340" x2="155" y2="400"/>
    <line x1="180" y1="340" x2="205" y2="400"/>
  </g>
  <!-- Sword -->
  <g stroke="#E8E8E8" stroke-width="10" stroke-linecap="round">
    <line x1="240" y1="240" x2="320" y2="200"/>
  </g>
  <line x1="232" y1="252" x2="252" y2="232" stroke="#8B5A2B" stroke-width="8" stroke-linecap="round"/>

  <!-- Red stickman (right, reacting) -->
  <g stroke="#FF4444" stroke-width="14" stroke-linecap="round" fill="none">
    <circle cx="370" cy="210" r="30" stroke="#FF4444" stroke-width="14" fill="#0a0a1e"/>
    <line x1="370" y1="240" x2="370" y2="340"/>
    <line x1="370" y1="275" x2="410" y2="245"/>
    <line x1="370" y1="275" x2="335" y2="245"/>
    <line x1="370" y1="340" x2="345" y2="400"/>
    <line x1="370" y1="340" x2="395" y2="400"/>
  </g>
</svg>
